name: Run codegen manually

on:
  workflow_dispatch:

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run codegen
        run: npm run codegen

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'Run automated codegen to update policy and cli documentation'
          title: '[Automated] - Update policy library and CLI documentation'
          body: 'This PR was automatically generated by a GitHub Actions workflow to update the policy library and CLI documentation using `npm run codegen`.'
          base: main
          branch: automated-update-branch
          delete-branch: true
