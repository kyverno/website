# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Verify codegen

permissions: {}

on:
  pull_request:
    branches:
      - main
      - release-*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-codegen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Determine policies ref
        id: policies_ref
        shell: bash
        run: |
          ref_name="${GITHUB_BASE_REF}"
          if [[ "$ref_name" =~ ^release-([0-9]+)-([0-9]+)(-[0-9]+)?$ ]]; then
            echo "value=release-${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          else
            echo "value=main" >> "$GITHUB_OUTPUT"
          fi
      - name: Install dependencies
        run: npm ci
      - name: Verify generated code is up to date
        env:
          POLICIES_REF: ${{ steps.policies_ref.outputs.value }}
          WEBSITE_BRANCH: ${{ github.base_ref }}
        run: npm run codegen:verify
